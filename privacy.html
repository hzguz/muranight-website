<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Privacy Policy — MuraNight</title>
  <link rel="icon" type="image/png" href="assets/icon-32.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','"Segoe UI"','Roboto','"Helvetica Neue"','Arial','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .prose-li ul { padding-left: 1.25rem; margin-top: 0.5rem; }
    .prose-li li { margin-bottom: 0.35rem; }
    .prose-li code { background: #f1f5f9; border-radius: 4px; padding: 1px 5px; font-size: 0.85em; }
    .prose-li a { text-decoration: underline; }
    [data-lucide] { display: inline-block; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans">

  <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-20 bg-slate-50/90 backdrop-blur border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-5 h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-2.5 font-bold text-slate-900 no-underline shrink-0">
        <img src="assets/icon-32.png" alt="MuraNight" class="w-7 h-7" />
        MuraNight
      </a>
      <div class="flex items-center gap-3">
        <div class="flex bg-white border border-slate-200 rounded-full p-1 gap-0.5">
          <button data-lang-btn="pt" class="px-3 py-1 rounded-full text-xs font-semibold transition-colors text-slate-500">PT</button>
          <button data-lang-btn="en" class="px-3 py-1 rounded-full text-xs font-semibold transition-colors text-slate-500">EN</button>
        </div>
        <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors">← Home</a>
      </div>
    </div>
  </header>

  <!-- ── CONTENT ────────────────────────────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-5 py-16">
    <h1 data-i18n="privacy.title"   class="text-4xl font-bold tracking-tight mb-2">Privacy Policy</h1>
    <p  data-i18n="privacy.updated" class="text-slate-500 text-sm mb-10">Last updated: May 18, 2026</p>
    <p  data-i18n="privacy.intro"   class="text-slate-600 leading-relaxed mb-6">Intro</p>
    <div data-i18n-privacy-sections></div>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
  <footer class="border-t border-slate-200 py-8 text-center text-sm text-slate-500">
    <div class="flex items-center justify-center gap-2 font-semibold text-slate-800 mb-2">
      <img src="assets/icon-32.png" alt="" class="w-5 h-5" />
      MuraNight
    </div>
    <div class="flex justify-center flex-wrap gap-x-5 gap-y-1">
      <a href="index.html"                      class="hover:text-slate-800 transition-colors">Home</a>
      <a href="mailto:contato@gustasoares.com"  data-i18n="footer.contact" class="hover:text-slate-800 transition-colors">Contact</a>
    </div>
    <p class="mt-3">© <span id="year"></span> MuraNight</p>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="main.js"></script>
</body>
</html>
